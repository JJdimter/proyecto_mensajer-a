<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Mensajería</title>

  <!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/a2d9d5a64f.js" crossorigin="anonymous"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>

  <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- Usuario -->
      <div class="user-status">

        <div class="user-info">
          <img src="https://i.pravatar.cc/100?img=1" alt="">
          
          <div>
            <h4>Maria</h4>
            <p>Activa ahora</p>
          </div>
        </div>

        <div class="icons">
          <i class="fa-regular fa-message"></i>
          <i class="fa-solid fa-bars"></i>
        </div>

      </div>

      <!-- Botón -->
      <div class="new-chat">
        <button>Nuevo Chat</button>
      </div>

      <!-- Contactos -->
      <div class="contacts">

        <div class="contact">
          <img src="https://i.pravatar.cc/100?img=2" alt="">
          
          <div>
            <h4>Juanita</h4>
            <p>At vero eos et acc...</p>
          </div>
        </div>

        <div class="contact">
          <img src="https://i.pravatar.cc/100?img=3" alt="">
          
          <div>
            <h4>Alberto</h4>
            <p>Lorem ipsum dolor sit.</p>
          </div>
        </div>

        <div class="contact">
          <img src="https://i.pravatar.cc/100?img=4" alt="">
          
          <div>
            <h4>Ignacio</h4>
            <p>Hola, ¿cómo estás?</p>
          </div>
        </div>

      </div>

    </aside>

    <!-- MAIN -->
    <main class="main-section">

      <img src="https://cdn-icons-png.flaticon.com/512/1041/1041916.png" alt="logo">

      <h1>Comienza el Networking</h1>

      <p>
        Presiona el botón <strong>“Nuevo chat”</strong> para comenzar a crear nuevas
        redes de contacto para tu empresa o emprendimiento.
      </p>

    </main>

  </div>

</body>
</html>
